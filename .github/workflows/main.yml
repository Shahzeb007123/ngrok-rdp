name: Free-Windows-RDP

on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360 # Keeps it running for the maximum 6 hours

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Ngrok via Chocolatey
        run: |
          choco install ngrok --no-progress -y

      - name: Authenticate Ngrok
        run: |
          ngrok config add-authtoken ${{ secrets.NGROK_AUTH_TOKEN }}

      - name: Configure and Enable Windows RDP
        run: |
          # Enable Remote Desktop in Windows Registry
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          # Permit RDP through Windows Firewall
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          # Set explicit secure password for the administrator account
          $Password = ConvertTo-SecureString "P@ssw0rd2026!" -AsPlainText -Force
          Set-LocalUser -Name "runneradmin" -Password $Password

      - name: Start Ngrok TCP Tunnel
        run: |
          Start-Process ngrok -ArgumentList "tcp 3389"

      - name: Fetch Connection Endpoint
        run: |
          Start-Sleep -Seconds 15
          Write-Host "===================================================="
          Write-Host "      YOUR REMOTE DESKTOP CONNECTION INFO"
          Write-Host "===================================================="
          # Fetch the active tunnel endpoint directly from Ngrok's agent API
          $TunnelInfo = Invoke-RestMethod -Uri http://127.0.0
          $PublicUrl = $TunnelInfo.tunnels.public_url
          $CleanUrl = $PublicUrl -replace "tcp://", ""
          Write-Host "RDP Address: $CleanUrl"
          Write-Host "Username   : runneradmin"
          Write-Host "Password   : P@ssw0rd2026!"
          Write-Host "===================================================="

      - name: Keep Alive Loop
        run: |
          # Prevents the GitHub Runner from closing immediately
          $loop = $true
          while($loop) {
              Start-Sleep -Seconds 60
          }
