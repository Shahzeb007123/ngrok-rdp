name: Free-Windows-RDP

on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Ngrok via Chocolatey
        run: |
          choco install ngrok --no-progress -y

      - name: Authenticate Ngrok
        run: |
          ngrok config add-authtoken ${{ secrets.NGROK_AUTH_TOKEN }}

      - name: Configure and Enable Windows RDP
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          $Password = ConvertTo-SecureString "P@ssw0rd2026!" -AsPlainText -Force
          Set-LocalUser -Name "runneradmin" -Password $Password

      - name: Start Ngrok TCP Tunnel
        run: |
          # Outfiles standard error to log.txt for tracking stability
          Start-Process ngrok -ArgumentList "tcp 3389 --log=stdout" -RedirectStandardOutput "ngrok_log.txt"

      - name: Fetch Connection Endpoint (With Retry Logic)
        run: |
          Write-Host "Waiting for Ngrok tunnel to initialize..."
          $MaxAttempts = 10
          $Attempt = 1
          $TunnelInfo = $null

          while ($null -eq $TunnelInfo -and $Attempt -le $MaxAttempts) {
              try {
                  Start-Sleep -Seconds 5
                  $TunnelInfo = Invoke-RestMethod -Uri http://127.0.0 -ErrorAction Stop
              } catch {
                  Write-Host "Attempt $Attempt/$MaxAttempts: Ngrok API not ready yet. Retrying..."
                  $Attempt++
              }
          }

          if ($null -eq $TunnelInfo -or $null -eq $TunnelInfo.tunnels.public_url) {
              Write-Error "Failed to fetch tunnel endpoint from Ngrok API."
              Write-Host "==== NGROK LOG OUTPUT ===="
              Get-Content ngrok_log.txt
              exit 1
          }

          $PublicUrl = $TunnelInfo.tunnels[0].public_url
          $CleanUrl = $PublicUrl -replace "tcp://", ""
          
          Write-Host "===================================================="
          Write-Host "      YOUR REMOTE DESKTOP CONNECTION INFO"
          Write-Host "===================================================="
          Write-Host "RDP Address: $CleanUrl"
          Write-Host "Username   : runneradmin"
          Write-Host "Password   : P@ssw0rd2026!"
          Write-Host "===================================================="

      - name: Keep Alive Loop
        run: |
          $loop = $true
          while($loop) {
              Start-Sleep -Seconds 60
          }
