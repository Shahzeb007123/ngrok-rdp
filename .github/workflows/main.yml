name: Windows-RDP

on: [workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download & Extract Ngrok
        run: |
          Invoke-WebRequest https://equinox.io -OutFile ngrok.zip
          Expand-Archive ngrok.zip -DestinationPath .

      - name: Connect ngrok Account
        run: .\ngrok.exe authtoken ${{ secrets.NGROK_AUTH_TOKEN }}

      - name: Enable RDP Access
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

      - name: Create Tunnel
        run: Start-Process -NoNewWindow .\ngrok.exe -ArgumentList "tcp 3389"

      - name: Display Connection Details
        run: |
          Write-Host "Wait a moment for the tunnel to open..."
          Start-Sleep -Seconds 15
          .\ngrok.exe tunnel list
